{% extends "common.html" %}
{% load static %}
{% block content %}
{% load crispy_forms_tags %}
    <div class="flex flex-col items-center justify-center">
        <div class="py-7 w-2/3 xl:w-1/3 text-pry-2">
            <h3 class="text-center font-bold text-pry-2">{{Action|default:"New"}} Post</h3>
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                {{form|crispy}}
                <div class="text-start">
                    <button class="bg-pry-1 text-pry-11 hover:bg-pry-11 hover:text-pry-2 p-1.5 rounded-lg my-3.5">Submit Post</button>
                </div>
            </form>
        </div>
    </div>
{% endblock %}
