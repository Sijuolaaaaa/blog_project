{% extends "common.html" %}
{% load static %}
{% block content %}
{% load crispy_forms_tags %}
    <div class="flex flex-col items-center justify-center lg:justify-start
    lg:items-start">
        <div class="py-7 w-2/3">
            <h3 class="text-center lg:text-start font-bold text-pry-2">Password reset</h3>
            <p class="text-sm py-4">Forgotten your password? Enter your email address below, and we’ll email instructions for setting a new one.</p>
            <form method="post">
                {% csrf_token %}
                {{form|crispy}}
                <div class="text-center lg:text-start">
                    <button class="bg-pry-1 text-pry-11 hover:bg-pry-11 hover:text-pry-2 p-1.5 rounded-lg my-3.5">Send</button>
                </div>
            </form>
        </div>
    </div>
{% endblock %}
