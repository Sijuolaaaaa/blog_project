{% extends "common.html" %} 
{% load static %} 
{% block content %}
{% load crispy_forms_tags %}
    <div class="flex flex-col items-center justify-center lg:justify-start
    lg:items-start">
        <div class="py-7 w-2/3">
            <h3 class="text-center lg:text-start font-bold text-pry-2">Password reset confirmation</h3>
            <p class= "text-sm py-4">Please enter your new password twice so we can verify you typed it in correctly.</p>
            <form method="post" class="xl:w-1/2">
                {% csrf_token %}
                {{form|crispy}}
            
                <button class="text-center lg:text-start bg-pry-1 text-pry-11 hover:bg-pry-11 hover:text-pry-2 p-1.5 rounded-lg my-3.5 text-sm">Change</button>
            </form>
        </div>
    </div>

{% endblock %}
