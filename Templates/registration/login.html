{% extends "common.html" %}
{% load static %}
{% block content %}
{% load crispy_forms_tags %}
    <div class="flex flex-col items-center justify-center">
    <div class="py-7 w-2/3 lg:w-1/3">
        <h4 class="text-center font-bold text-pry-2">Login</h4>
        <form method="post" class="py-5 text-sm text-pry-2">
            {% csrf_token %}
            {{form|crispy}}
            <div class= "flex justify-between my-4">
                <button class="bg-pry-1 text-pry-11 hover:bg-pry-11 hover:text-pry-2 p-1.5 rounded-lg">login</button>
                <p><a href="{% url "password_reset" %}" class="font-semibold py-3 text-sec-2 hover:text-sec-9"> Forgot password?</a></p>
            </div>
            <p>Don't have an account? <a href="{% url "signup" %}" class="font-semibold hover:text-pry-5">Register here</a></p>
        </form>
    </div>
    </div>
{% endblock %}
