{% extends "common.html" %}
{% load static %}
{% block content %}
{% load crispy_forms_tags %}
    <div class="flex flex-col items-center justify-center">
        <div class="py-7 w-2/3 xl:w-1/3 text-pry-2">
            <h3 class="text-center font-bold text-pry-2">New user registration</h3>
            <form method="post">
                {% csrf_token %}
                {{form|crispy}}
                <button class="bg-pry-1 text-pry-11 hover:bg-pry-11 hover:text-pry-2 p-1.5 rounded-lg my-4">
                    Signup
                </button>
                <p class="text-sm">Already have an account? <a href="{% url "login" %}" class="font-semibold text-ntr-7 hover:text-ntr-2">Sign In</a></p>
            </form>
        </div>
    </div>
{% endblock %}
