{% extends "common.html" %}
{% load static %}
{% block content %}
{% load crispy_forms_tags %}
    <div class="flex flex-col items-center justify-center">
        <div class="py-7 w-2/3 xl:w-1/3 text-ntr-3">
            <h2 class="font-bold text-sm pb-4 text-center">Edit Profile</h2>

            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                {{ form|crispy }}
                <button type="submit" class="bg-pry-1 text-pry-11 hover:bg-pry-11 hover:text-pry-2 p-1.5 rounded-lg my-4">Save</button>
            </form>
        </div>
    </div>
{% endblock  %}
